<!DOCTYPE html>
<html>

<head>

<title>Bench Spotted</title>

<link rel="manifest" href="/static/manifest.json">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#2f855a">

<link rel="apple-touch-icon" href="/static/icons/icon-192.png">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">


<link rel="stylesheet"
      href="https://unpkg.com/leaflet/dist/leaflet.css">


<style>

html, body {

    margin:0;
    padding:0;
    height:100%;
    width:100%;

}


#map {

    width:100%;
    height:100vh;

}


#title {

    position:absolute;

    top:15px;
    left:15px;

    background:white;

    padding:10px 18px;

    border-radius:10px;

    font-family:Arial,sans-serif;

    font-size:24px;

    font-weight:bold;

    z-index:1000;

}


#addButton {

    position:absolute;

    bottom:20px;

    left:20px;

    padding:15px 25px;

    border-radius:15px;

    border:none;

    background:white;

    font-size:18px;

    cursor:pointer;

    z-index:1000;

}


.leaflet-popup-content {

    font-size:16px;

}


</style>


</head>


<body>


<div id="title">
🪑 Bench Spotted
</div>


<button id="addButton">
➕ Add Spot
</button>


<div id="map"></div>



<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>



<script>


// ======================
// CREATE MAP
// ======================


const map = L.map('map').setView(
    [46.06,13.23],
    13
);



L.tileLayer(

'https://tile.openstreetmap.org/{z}/{x}/{y}.png',

{

maxZoom:19,

attribution:'© OpenStreetMap'

}

).addTo(map);





// ======================
// GPS LOCATION
// ======================


if (navigator.geolocation) {


    navigator.geolocation.getCurrentPosition(

        function(position){


            const lat = position.coords.latitude;
            const lng = position.coords.longitude;


            map.setView(
                [lat,lng],
                16
            );


            L.marker(
                [lat,lng]
            )
            .addTo(map)
            .bindPopup(
                "📍 You are here"
            )
            .openPopup();


        },


        function(error){


            console.log(
                "GPS ERROR:",
                error.message
            );


        },


        {

            enableHighAccuracy:true,
            timeout:10000

        }


    );


}

else {


    console.log(
        "GPS not supported"
    );


}

// ======================
// LOAD SPOTS
// ======================


fetch("/api/spots")


.then(response => response.json())


.then(spots => {



spots.forEach(spot => {



const marker = L.marker(

[

spot.latitude,

spot.longitude

]

)

.addTo(map);




marker.bindPopup(`


<h3>${spot.name}</h3>


<p>
${spot.description}
</p>


<p>
Category: ${spot.category}
</p>


<p>
Calmness: ${spot.calmness}/10
</p>



${
spot.image

?

`

<img

src="/${spot.image}"

width="220"

style="border-radius:12px;">

`

:

""

}



`);



});



})


.catch(error => {


console.log(

"Error loading spots:",

error

);


});







// ======================
// ADD BUTTON
// ======================


document.getElementById("addButton").onclick=function(){


window.location.href="/add";


};







// ======================
// TAP MAP TO ADD SPOT
// ======================


map.on("click",function(e){


const latitude =
e.latlng.lat;


const longitude =
e.latlng.lng;



window.location.href =

"/add?lat="

+ latitude +

"&lng="

+ longitude;



});







// ======================
// SERVICE WORKER
// ======================


if ("serviceWorker" in navigator){


navigator.serviceWorker.register(

"/static/service-worker.js"

)


.then(function(){


console.log(
"Service Worker registered"
);


})


.catch(function(error){


console.log(error);


});


}



</script>


</body>


</html>
