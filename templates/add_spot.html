<!DOCTYPE html>
<html>

<head>

<title>Add Spot - Bench Spotted</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{

    font-family:Arial,sans-serif;
    margin:20px;

}

#map{

    height:350px;
    width:100%;
    border-radius:15px;
    margin-bottom:20px;

}

input,
textarea,
select{

    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;

    border-radius:10px;
    border:1px solid #ccc;

    box-sizing:border-box;

}

button{

    padding:12px 20px;

    border:none;

    border-radius:10px;

    cursor:pointer;

    margin-right:10px;

}

#save{

    background:#2f855a;
    color:white;

}

#gps{

    background:#eeeeee;

}

</style>

</head>

<body>

<h2>🚀 NEW VERSION TEST</h2>
<p>Select the exact place on the map or use your GPS.</p>

<div id="map"></div>

<form action="/add" method="post" enctype="multipart/form-data">

<label>Name</label>

<input
name="name"
required>

<label>Description</label>

<textarea
name="description"
required></textarea>

<label>Category</label>

<select name="category">

<option value="bench">🪑 Bench</option>
<option value="panorama">🌅 Panorama</option>
<option value="nature">🌳 Nature</option>
<option value="quiet">🤫 Quiet Place</option>

</select>

<label>Calmness (1-10)</label>

<input
type="number"
name="calmness"
min="1"
max="10"
required>

<label>Photo</label>

<input
type="file"
name="image"
accept="image/*">

<input
id="latitude"
name="latitude"
type="hidden">

<input
id="longitude"
name="longitude"
type="hidden">

<button
id="gps"
type="button"
onclick="getLocation()">

📍 Use my GPS

</button>

<button
id="save"
type="submit">

💾 Save Spot

</button>

</form>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// Start with a neutral world view
let lat = 0;
let lng = 0;

const map = L.map("map").setView([20,0],2);

L.tileLayer(
"https://tile.openstreetmap.org/{z}/{x}/{y}.png",
{
    maxZoom:19,
    attribution:"© OpenStreetMap"
}
).addTo(map);

let marker = null;

function updatePosition(latitude, longitude){

    lat = latitude;
    lng = longitude;

    document.getElementById("latitude").value = lat;
    document.getElementById("longitude").value = lng;
    console.log("SAVING POSITION:", lat, lng);
    document.getElementById("position").innerHTML =
"Latitude: " + lat + "<br>Longitude: " + lng;

    if(marker){

        marker.setLatLng([lat,lng]);

    }else{

        marker = L.marker([lat,lng]).addTo(map);

    }

    map.setView([lat,lng],17);

}

function getLocation(){

    if(!navigator.geolocation){

        alert("Geolocation is not supported.");

        return;

    }

    navigator.geolocation.getCurrentPosition(

        function(position){

            updatePosition(
                position.coords.latitude,
                position.coords.longitude
            );

        },

        function(error){

            alert("Unable to retrieve your GPS position.");

            console.log(error);

        },

        {

            enableHighAccuracy:true,
            timeout:10000

        }

    );

}

map.on("click", function(e){

    lat = e.latlng.lat;
    lng = e.latlng.lng;

    if(marker){

        marker.setLatLng([lat,lng]);

    } else {

        marker = L.marker([lat,lng]).addTo(map);

    }

    document.getElementById("latitude").value = lat;
    document.getElementById("longitude").value = lng;

});

// Do not automatically overwrite user selection
// User can press the GPS button manually

</script>

</body>

</html>
